<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='630' viewBox='0 0 1200 630'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#0a0a0b'/>
      <stop offset='100%' style='stop-color:#18181b'/>
    </linearGradient>
    <linearGradient id='accent' x1='0%' y1='0%' x2='100%' y2='0%'>
      <stop offset='0%' style='stop-color:#6366f1'/>
      <stop offset='50%' style='stop-color:#a78bfa'/>
      <stop offset='100%' style='stop-color:#38bdf8'/>
    </linearGradient>
  </defs>
  <rect width='1200' height='630' fill='url(#bg)'/>
  <!-- Glow circles -->
  <circle cx='200' cy='200' r='300' fill='rgba(99,102,241,0.07)'/>
  <circle cx='1000' cy='400' r='250' fill='rgba(129,140,248,0.05)'/>
  <!-- Grid dots -->
  <pattern id='dots' x='0' y='0' width='40' height='40' patternUnits='userSpaceOnUse'>
    <circle cx='1' cy='1' r='1' fill='rgba(255,255,255,0.15)'/>
  </pattern>
  <rect width='1200' height='630' fill='url(#dots)' opacity='0.4'/>
  <!-- Brand text -->
  <text x='80' y='260' font-family='system-ui,sans-serif' font-size='96' font-weight='800' fill='url(#accent)'>Aiva</text>
  <text x='80' y='340' font-family='system-ui,sans-serif' font-size='36' font-weight='400' fill='rgba(250,250,250,0.7)'>AI systems that ship.</text>
  <!-- Badge -->
  <rect x='80' y='380' width='220' height='36' rx='18' fill='rgba(99,102,241,0.15)' stroke='rgba(99,102,241,0.3)' stroke-width='1'/>
  <text x='190' y='404' font-family='system-ui,sans-serif' font-size='13' font-weight='600' fill='#818cf8' text-anchor='middle' letter-spacing='2'>AI AGENCY</text>
  <!-- URL -->
  <text x='80' y='570' font-family='system-ui,sans-serif' font-size='18' fill='rgba(250,250,250,0.3)'>aiva.agency</text>
</svg>